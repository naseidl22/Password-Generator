<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

    <h1>Password Generator</h1>

    <!-- Password Display -->
    <div class="password-wrapper">
        <input type="password" id="generated-password" readonly>
        
        <button id="toggle-visibility" class="icon-btn">👁</button>
        <button id="copy-btn" class="copy-btn">Copy</button>
    </div>

    <!-- Length Slider -->
    <div class="control-group">
        <label>
            Password Length: <span id="length-value">20</span>
        </label>
        <input type="range" id="length" min="6" max="100" value="20">
    </div>

    <!-- Options -->
    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>

    <button id="generate-btn" class="generate-btn">Generate Password</button>

    <!-- Strength Section -->
    <div class="strength-section">
        <meter id="strength-meter" min="0" max="100"></meter>
    </div>

</div>

<script src="keeper.js"></script>
</body>
</html>
