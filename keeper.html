<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">

    <!-- Password + Generate Row -->
    <div class="password-row">

        <!-- Password Display -->
        <div class="password-wrapper">

            <input type="password" id="generated-password" readonly>

            <!-- Show / Hide Button -->
            <button id="toggle-visibility" class="icon-btn">
                <img id="visibility-icon" src="assets/icon-eye-open.svg" alt="toggle password">
            </button>

        </div>

        <!-- Generate Button -->
        <button id="generate-btn" class="generate-icon-btn">
            <img src="assets/icon-dice.svg" alt="generate password">
        </button>

    </div>

        <!-- Strength Section -->
    <div class="strength-section">
        <meter id="strength-meter" min="0" max="100"></meter>
    </div>


    <!-- Copy + Strength Row -->
    <div class="copy-strength-row">

    
        <div class="strength-display">
            Strength: <span id="strength-text">Weak</span>
        </div>

        <button id="copy-btn" class="copy-btn">Copy</button>


    </div>

    <!-- Length Slider -->
    <div class="control-group">

        <input type="range" id="length" min="8" max="100" value="20">
                <label>
            Password Length: <span id="length-value">20</span>
        </label>
    </div>

    <!-- Options -->
    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols" checked> Symbols</label>
    </div>


</div>

<script src="keeper.js"></script>
</body>
</html>
