<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
</head>
<body>
    <div class="main-container">

        <h1>Password Generator</h1>

        <!-- Generated Password Display -->
        <div class="password-display">
            <input type="text" id="generated-password">
            <button id="copy-btn">Copy</button>
        </div>

        <!-- Length Slider -->
        <div class="control-group">
            <label for="length">
                Password Length: <span id="length-value">20</span>
            </label>
            <input type="range" id="length" min="8" max="100" value="20">
        </div>

        <!-- Character Options -->
        <div class="options">
            <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
            <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
            <label><input type="checkbox" id="symbols" checked> Symbols (!@#$)</label>
        </div>


        <!-- Strength Meter -->
        <div class="strength-section">
            <meter id="strength-meter" min="0" max="100">0</meter>
            <p id="strength-text">Strength: -</p>
            <p id="entropy-text">Entropy: 0 bits</p>
        </div>

    </div>

    <script src="keeper.js"></script>
</body>
</html>
