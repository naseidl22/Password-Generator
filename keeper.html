<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main-container">

    <!-- Password + Generate Row -->
    <div class="password-row">

        <div class="password-wrapper">

            <input type="password" id="generated-password" readonly>

            <button id="toggle-visibility" class="icon-btn">
                <img id="visibility-icon" src="assets/icon-eye-open.svg" alt="toggle password">
            </button>

        </div>

        <button id="generate-btn" class="generate-icon-btn">
            <img src="assets/icon-dice.svg" alt="generate password">
        </button>

    </div>

    <!-- Strength Meter -->
    <div class="strength-section">
        <meter id="strength-meter" min="0" max="100"></meter>
    </div>

    <!-- Copy + Strength -->
    <div class="copy-strength-row">

        <div class="strength-display">
            Strength: <span id="strength-text">Weak</span>
        </div>

        <button id="copy-btn" class="copy-btn">Copy</button>

    </div>

    <!-- Mode Selector -->
    <div class="mode-row">

        <label class="mode-option">
            <input type="radio" name="mode" value="password" checked>
            Password
        </label>

        <label class="mode-option">
            <input type="radio" name="mode" value="passphrase">
            Passphrase
        </label>

    </div>

    <!-- Length Slider -->
    <div class="control-group">

        <input type="range" id="length" min="8" max="100" value="20">

        <label>
            <span id="length-label">Password Length</span>:
            <span id="length-value">20</span>
        </label>

    </div>

    <!-- PASSWORD OPTIONS -->
    <div class="options" id="password-options">

        <label>
            <input type="checkbox" id="uppercase" checked>
            Uppercase
        </label>

        <label>
            <input type="checkbox" id="numbers" checked>
            Numbers
        </label>

        <label>
            <input type="checkbox" id="symbols" checked>
            Symbols
        </label>

    </div>

    <!-- PASSPHRASE OPTIONS -->
    <div class="options hidden" id="passphrase-options">

        <div class="passphrase-row">

            <!-- LEFT SIDE -->
            <div class="passphrase-left">

                <label>
                    <input type="checkbox" id="capitalize">
                    Capitals
                </label>

                <label>
                    <input type="checkbox" id="random-number">
                    Numbers
                </label>

            </div>

            <!-- RIGHT SIDE -->
            <div class="separator-section">

                <span class="separator-label">Separator:</span>

                <div class="separator-group">

                    <label class="separator-btn">
                        <input type="radio" name="separator" value="-" checked>
                        <span>-</span>
                    </label>

                    <label class="separator-btn">
                        <input type="radio" name="separator" value=".">
                        <span>.</span>
                    </label>

                    <label class="separator-btn">
                        <input type="radio" name="separator" value="_">
                        <span>_</span>
                    </label>

                    <label class="separator-btn">
                        <input type="radio" name="separator" value="!">
                        <span>!</span>
                    </label>

                    <label class="separator-btn">
                        <input type="radio" name="separator" value="?">
                        <span>?</span>
                    </label>

                    <label class="separator-btn">
                        <input type="radio" name="separator" value=" ">
                        <span>␣</span>
                    </label>

                </div>

            </div>

        </div>

    </div>

    <div class="save-password-section">
    
        <input type="text" id="site-input" placeholder="Website">
        <input type="text" id="username-input" placeholder="Username">
        <button id="save-btn">Save</button>
    
    </div>

    <div class="saved-link">
    <button onclick="window.location.href='passwords.html'">View Saved Passwords</button>
    </div>  

</div>

<script src="keeper.js"></script>
<script src="crypto.js"></script>

</body>
</html>
